name: agent-box

services:
  agent:
    build:
      context: .
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        OPENCODE_VERSION: ${OPENCODE_VERSION:-latest}
        CODEX_VERSION: ${CODEX_VERSION:-latest}
    image: agent-box:local

    init: true            # reap zombies / forward signals cleanly for the TUI
    stdin_open: true      # docker -i
    tty: true             # docker -t
    working_dir: /${PROJECT_NAME:-workspace}
    user: "1000:1000"     # the image's built-in non-root 'developer' user

    environment:
      # ---- OpenCode + omo: DeepSeek for text, Gemini for multimodal (set in .env) ----
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # ---- Claude Code: Pro/Max SUBSCRIPTION via OAuth token (set in .env) ----
      # Generate once with `claude setup-token`; bills to your subscription, not the API.
      # Do NOT also set ANTHROPIC_API_KEY — an API key would override the subscription.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # If you instead use an API key or a gateway, comment the line above and uncomment these:
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      # ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      # ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}

      # ---- no surprise self-upgrades in the box; you own versions via build args ----
      DISABLE_AUTOUPDATER: "1"
      DISABLE_TELEMETRY: "1"

      # ---- per-project ISOLATED state, redirected into ./.agent (gitignore it!) ----
      # This is the whole point: each project gets its own dotfiles, so no cross-project
      # memory bleed, and your host ~/.claude / ~/.config are never touched.
      CLAUDE_CONFIG_DIR: /${PROJECT_NAME:-workspace}/.agent/claude
      CODEX_HOME: /${PROJECT_NAME:-workspace}/.agent/codex
      XDG_CONFIG_HOME: /${PROJECT_NAME:-workspace}/.agent/config
      XDG_DATA_HOME: /${PROJECT_NAME:-workspace}/.agent/data
      XDG_STATE_HOME: /${PROJECT_NAME:-workspace}/.agent/state
      XDG_CACHE_HOME: /${PROJECT_NAME:-workspace}/.agent/cache

    volumes:
      # The project — the ONLY thing the agent can read/write by default.
      # PROJECT_DIR is injected by the `agentbox` shell wrapper (defaults to current dir).
      - ${PROJECT_DIR:-.}:/${PROJECT_NAME:-workspace}

      # OPTIONAL: reuse your git identity, read-only. Uncomment if you have ~/.gitconfig.
      # - ${HOME}/.gitconfig:/home/developer/.gitconfig:ro

      # Shared package caches — speed up repeated installs across sessions.
      # For UNTRUSTED projects, comment these out (poisoned cache risk).
      - npm-cache:/home/developer/.npm
      - pip-cache:/home/developer/.cache/pip

    # ---- blast-radius limits: the container is the boundary, so cap what it can do ----
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 1024
    mem_limit: 6g
    cpus: 4
    tmpfs:
      - /tmp:exec

    # OPTIONAL: publish a port if you use `opencode serve` / `opencode web`.
    # ports:
    #   - "127.0.0.1:4096:4096"

    # Keep the container alive in background so `agentbox exec` can attach.
    # The entrypoint (agent-init.sh) still runs on container start, then sleeps.
    command: ["sleep", "infinity"]

volumes:
  npm-cache:
  pip-cache:
